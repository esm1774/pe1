<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المنصة | PE Smart School</title>
    <meta name="description" content="لوحة تحكم المنصة لإدارة المدارس والاشتراكات في نظام PE Smart School SaaS">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Quill CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .ql-container {
            font-family: inherit;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0 0 8px 8px;
            border-color: var(--border-glass) !important;
        }

        .ql-toolbar {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px 8px 0 0;
            border-color: var(--border-glass) !important;
        }

        .editor-wrapper {
            margin-top: 8px;
        }

        #postEditor {
            height: 300px;
        }
    </style>
</head>

<body>

    <!-- ============================================================
     LOGIN PAGE
     ============================================================ -->
    <div id="loginPage" class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon">🛡️</div>
                <h1>لوحة تحكم المنصة</h1>
                <p>PE Smart School - Super Admin</p>
            </div>

            <div id="loginError" class="login-error hidden"></div>

            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="loginUsername" class="form-input" placeholder="superadmin"
                    autocomplete="username">
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="••••••••"
                    autocomplete="current-password">
            </div>

            <button onclick="handleLogin()" class="btn btn-primary" id="loginBtn">
                🔐 تسجيل الدخول
            </button>
        </div>
    </div>

    <!-- ============================================================
     MAIN APP
     ============================================================ -->
    <div id="adminApp" class="admin-app">
        <!-- TOP NAV -->
        <nav class="top-nav">
            <div class="nav-brand">
                <button id="mobileMenuBtn" class="btn btn-outline btn-sm mobile-only" onclick="toggleSidebar()"
                    style="padding: 4px 8px; font-size: 18px; margin-left: 10px;">☰</button>
                <div class="brand-icon">🛡️</div>
                <h2>PE <span>Smart</span> Admin</h2>
            </div>
            <div class="nav-user">
                <button id="themeToggleBtn" onclick="toggleTheme()" class="btn btn-outline btn-sm"
                    style="padding: 4px 8px; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 16px;"
                    title="الوضع الداكن">🌙</button>
                <span class="user-name">مرحباً، <strong id="adminNameDisplay">المدير</strong></span>
                <button onclick="handleLogout()" class="btn btn-outline btn-sm">🚪 خروج</button>
            </div>
        </nav>

        <!-- BODY -->
        <div class="admin-body">
            <!-- SIDEBAR -->
            <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
            <aside class="sidebar" id="sidebar">
                <ul class="sidebar-menu">
                    <li>
                        <button class="sidebar-link active" onclick="navigate('dashboard')" data-page="dashboard">
                            <span class="icon">📊</span> لوحة المعلومات
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('schools')" data-page="schools">
                            <span class="icon">🏫</span> المدارس
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('announcements')" data-page="announcements">
                            <span class="icon">📢</span> الإعلانات
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('plans')" data-page="plans">
                            <span class="icon">💎</span> الخطط والأسعار
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('audit_logs')" data-page="audit_logs">
                            <span class="icon">📜</span> سجل العمليات
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('analytics')" data-page="analytics">
                            <span class="icon">📈</span> التحليلات
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('settings')" data-page="settings">
                            <span class="icon">⚙️</span> إعدادات المنصة
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('blog')" data-page="blog">
                            <span class="icon">📰</span> المدونة والدروس
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('media')" data-page="media">
                            <span class="icon">🖼️</span> مكتبة الوسائط
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-link" onclick="navigate('health')" data-page="health">
                            <span class="icon">🏥</span> حالة النظام
                        </button>
                    </li>
                </ul>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="main-content" id="mainContent">
                <div class="spinner"></div>
            </main>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modalOverlay" class="modal-overlay" onclick="event.target===this && closeModal()">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- MEDIA PICKER (separate overlay to avoid replacing blog post form) -->
    <div id="mediaPickerOverlay" class="modal-overlay" onclick="event.target===this && closeMediaPicker()"
        style="z-index:1010">
        <div class="modal" id="mediaPickerContent" style="max-width:720px"></div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="js/admin.js?v=2.2"></script>
</body>

</html>
